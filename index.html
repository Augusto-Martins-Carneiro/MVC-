<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>CRUD de Lanches</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🍔 Siri Cascudo </h1>

    <input type="text" id="nome" placeholder="Nome do lanche">
    <input type="number" id="preco" placeholder="Preço">
    <input type="text" id="ingredientes" placeholder="Ingredientes (separados por vírgula)">

    <button class="add-btn" onclick="salvarLanche()">Salvar</button>

    <h2>📋 Lista de Lanches</h2>
    <div id="lista"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
